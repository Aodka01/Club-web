<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Clubes</title>
    <!-- Bootstrap CDN para diseño rápido -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Variables de colores para light mode */
        :root {
            --primary-red: #dc3545;
            --dark-red: #c82333;
            --light-red: #f8d7da;
            --border-red: #f5c6cb;
            --text-red: #721c24;
            
            /* Variables generales */
            --bg-color: #ffffff;
            --text-color: #212529;
            --card-bg: #ffffff;
            --navbar-bg: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --muted-text: #6c757d;
            --input-bg: #ffffff;
            --alert-success-bg: #d4edda;
            --alert-success-text: #155724;
            --alert-success-border: #c3e6cb;
        }

        /* Variables para dark mode */
        .dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #e9ecef;
            --card-bg: #2d2d2d;
            --navbar-bg: linear-gradient(135deg, #b02a37 0%, #8b1d2a 100%);
            --border-color: #495057;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --muted-text: #adb5bd;
            --input-bg: #343a40;
            --alert-success-bg: #1e4620;
            --alert-success-text: #a3cfbb;
            --alert-success-border: #4a7c59;
        }

        /* Aplicar variables al body */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Navbar con colores dinámicos */
        .navbar-red {
            background: var(--navbar-bg) !important;
            box-shadow: 0 2px 10px var(--shadow-color);
        }

        .navbar-red .navbar-brand {
            font-weight: 600;
            color: white !important;
        }

        .navbar-red .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            transition: color 0.3s ease;
        }

        .navbar-red .navbar-nav .nav-link:hover {
            color: white !important;
        }

        /* Botones principales */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
            background: linear-gradient(135deg, var(--dark-red) 0%, #a02622 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-warning:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-info:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(23, 162, 184, 0.4);
        }

        /* Cards con estilo dinámico */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            color: var(--text-color);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.2);
        }

        /* Alertas con colores dinámicos */
        .alert-danger {
            background-color: var(--light-red);
            color: var(--text-red);
            border: 1px solid var(--border-red);
        }

        .alert-success {
            background-color: var(--alert-success-bg);
            color: var(--alert-success-text);
            border: 1px solid var(--alert-success-border);
        }

        /* Formularios */
        .form-control {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
            background-color: var(--input-bg);
            color: var(--text-color);
        }

        .form-control::placeholder {
            color: var(--muted-text);
        }

        /* Texto muted */
        .text-muted {
            color: var(--muted-text) !important;
        }

        /* Fondos de secciones */
        .bg-light {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color);
        }

        /* Badges */
        .badge.bg-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%) !important;
        }

        .badge.bg-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%) !important;
        }

        /* Transiciones suaves para el cambio de tema */
        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        
        /* Evitar transiciones en elementos que no deben tenerlas */
        .navbar-toggler-icon,
        .btn-close,
        .fas {
            transition: none;
        }

        /* Responsive improvements */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.1rem;
            }
            
            .card {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-red">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-users"></i> Clubes ITSC
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <button id="theme-toggle" class="nav-link btn btn-link" title="Cambiar tema">
                                <i class="fas fa-moon"></i>
                            </button>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'profile' %}">
                                <i class="fas fa-user"></i> Mi Perfil
                            </a>
                        </li>
                        <li class="nav-item">
                            <span class="nav-link">
                                <i class="fas fa-hand-wave"></i> Hola, {{ user.username }}
                            </span>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'logout' %}" class="d-inline">
                                {% csrf_token %}
                                <button class="nav-link btn btn-link" type="submit" style="text-decoration:none;">
                                    <i class="fas fa-sign-out-alt"></i> Salir
                                </button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <button id="theme-toggle" class="nav-link btn btn-link" title="Cambiar tema">
                                <i class="fas fa-moon"></i>
                            </button>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">
                                <i class="fas fa-sign-in-alt"></i> Entrar
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 fade-in">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <i class="fas fa-info-circle me-2"></i>{{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dark Mode Toggle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            const body = document.body;
            const icon = themeToggle.querySelector('i');
            
            // Función para aplicar el tema con animación
            function applyTheme(isDark, animate = true) {
                if (animate) {
                    // Agregar clase de transición
                    body.style.transition = 'background-color 0.3s ease, color 0.3s ease';
                }
                
                if (isDark) {
                    body.classList.add('dark-mode');
                    icon.className = 'fas fa-sun';
                    themeToggle.title = 'Cambiar a modo claro';
                    localStorage.setItem('theme', 'dark');
                } else {
                    body.classList.remove('dark-mode');
                    icon.className = 'fas fa-moon';
                    themeToggle.title = 'Cambiar a modo oscuro';
                    localStorage.setItem('theme', 'light');
                }
                
                // Remover la transición después de un tiempo
                if (animate) {
                    setTimeout(() => {
                        body.style.transition = '';
                    }, 300);
                }
            }
            
            // Verificar preferencia guardada o preferencia del sistema
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // Aplicar tema inicial sin animación para evitar flash
            const initialDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            applyTheme(initialDark, false);
            
            // Event listener para el botón toggle
            themeToggle.addEventListener('click', function() {
                const isDark = body.classList.contains('dark-mode');
                applyTheme(!isDark, true);
                
                // Pequeña animación en el botón
                themeToggle.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    themeToggle.style.transform = '';
                }, 150);
            });
            
            // Escuchar cambios en la preferencia del sistema (solo si no hay preferencia guardada)
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                if (!localStorage.getItem('theme')) {
                    applyTheme(e.matches, true);
                }
            });
        });
    </script>
</body>
</html>
