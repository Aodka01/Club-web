{% extends "base.html" %}
{% block content %}
<style>
.form-label {
    font-weight: 600;
    color: #333;
}
.form-control,
.form-control:focus,
.form-control:not([type='color']) {
    border-radius: 8px;
    border: 1px solid #ddd;
    padding: 0.75rem;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.form-control:focus {
    border-color: #dc3545;
    box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.2);
}
.form-group {
    margin-bottom: 1.25rem;
}
</style>
<div class="card">
    <div class="card-header" style="background: linear-gradient(135deg, #dc3545, #c82333); color: white;">
        <h2 class="mb-0">{{ view.object|default:"Nuevo Club" }}</h2>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-danger">Guardar Club</button>
            <a href="{% url 'club_list' %}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
